<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>jQuery.getJSON demo</title>
		<script src="https://code.jquery.com/jquery-3.5.0.js"></script>
	</head>
	<body>
		<h1>My Phonebook</h1>
		<script>
			console.log("testest");
			(function () {
				$.getJSON("api/data", function (data) {
					var item = [];
					$.each(data, function(key, val) {
						item.push("<li>" + key + " : " + val + "</li>");
					});
					$("<ul/>", {
						"class" : "my-new-list",
						html: item.join("")
					}).appendTo("body");
				});
			})();
		</script>
	</body>
</html>
