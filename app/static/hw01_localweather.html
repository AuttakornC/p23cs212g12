<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>Homework01 : Weather</title>
		<script src="https://code.jquery.com/jquery-3.5.0.js"></script>
	</head>
		<script>
			(function () {
				$.getJSON("api/weather", function (data) {
					$("<h1/>", {
						"class": "title",
						html: data["city"] + " AQI"
					}).appendTo("body");

					var item = [];
					$.each(data["data"], function(key, val) {
						item.push("<li>" + key + " : " + val + "</li>");
					});
					$("<ul/>", {
						"class" : "my-new-list",
						html: item.join("")
					}).appendTo("body");
				});
			})();
		</script>
	</body>
</html>
