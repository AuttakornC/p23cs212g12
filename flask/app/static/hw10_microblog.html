<!doctype html>
<html lang="en">
    <head>
        <!-- Required meta tags -->
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

        <!-- Bootstrap CSS -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
        <link rel="stylesheet" href="/static/css/hw10.css">
        <link rel="stylesheet" href="/static/css/mytwitter.css">
        <link rel="stylesheet" href="/static/css/open-iconic-bootstrap.css">
        <title>My Twitter</title>
    </head>
    <body>
        <nav class="navbar navbar-expand-md navbar-light">
            <div class="container">
                <div class="navbar-nav">
                    <a class="nav-item nav-link" href="#"><span class="oi oi-home"></span> Home</a>
                    <a class="nav-item nav-link" href="#"><span class="oi oi-bolt"></span> Moments</a>
                    <a class="nav-item nav-link" href="#"><span class="oi oi-bell"></span> Notifications</a>
                    <a class="nav-item nav-link" href="#"><span class="oi oi-envelope-open"></span> Messages</a>
                </div>
                <form class="form-inline">
                    <input class="form-control" id="nav-search" type="search" placeholder="Search Twitter"> &nbsp;
                    <img class="tw-user-small rounded-circle" src="/static/img/user-icon.png"> &nbsp;
                    <button class="btn" id="nav-tweet-btn" type="submit">Tweet</button>
                </form>            
            </div>
        </nav>

        <div class="container">
            <div class="row">
                <div id="left_3" class="col-md-3">
                    <div class="content-box">Account details</div>
                    <div class="content-box">Trends</div>
                </div>
                <div id="center_6" class="col-md-6">
                    <div class="content-box" id="feed">
                        <div class="new-tweet-row" style="padding: 1rem; margin-bottom: 1rem;">
                            <form onsubmit="return formSubmit(this);" id="post-form" class="my-form">
                                <label id="name_f" for="name">Name :
                                    <input type="text" name="name" maxlength="50" placeholder="Name..." required>
                                </label>
                                <label id="email_f" for="email">Email :
                                    <input type="text" name="email" maxlength="50" placeholder="Email..." required>
                                </label>
                                <label id="message_f" for="message">Message :
                                    <textarea name="message" placeholder="Message..." required></textarea>
                                </label>
                                <input type="number" name="id" id="id_f" value="-1" hidden>
                                <input type="submit" value="Post">
                            </form>              
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Optional JavaScript -->
        <!-- jQuery first, then Popper.js, then Bootstrap JS -->
        <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>
        <script src="/static/js/hw10.js"></script>
    </body>
</html>
