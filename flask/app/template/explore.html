{% extends 'nav.html' %}

{% block cssimp %}
{{ super() }}

<link rel="stylesheet" href="/static/css/explore.css">
<script src="https://code.jquery.com/jquery-3.5.0.js"></script>


{% endblock %}
{% block title %}Explore{% endblock %}
    
{% block content %}
<main>
    <h1 class="topic">Explore Flash Cards</h1>
    <hr class="divider">

    <div class="boxSearch">
        <span class="search">Search</span> <span><img class="search-icon" src="/static/image/search-icon.png" alt=""></span>
    </div>
    <h1 class="title">All Flash Cards</h1>

    <div class="container"> 
        <!-- <div class="box">
            <div class="profile">
                <img class="profile-icon" src="/static/image/profile-icon.png" alt="">
                <span class="people">Johnny007</span>
            </div>
            <div class="description"><h4 id="nameD" class="deckName">Irregular Verbs</h4><h5 class="cardNum">25 Cards</h5></div>
            <button class="button">Preview</button>
        </div>-->
    </div>
    
    <div id="preview">
        <div class="sug-window">
            <div>
                <h1>Irregular Verbs<div id="sug-close" class="x"><div></div><div></div></div></h1>
                <h4>25 Cards</h4> 
            </div>
            <!-- <ul class="sug-nav">
                <li id="sug-nav-own" class="activate">My Deck</li> 
                <li id="sug-nav-dict">Dictionary</li> 
                <li id="sug-nav-other">Other Deck</li>
                <li id="sug-nav-bg"></li>
            </ul> -->
            <!-- <div class="underline"></div> -->
            <ul id="sug-own" class="sug-list">
                <li><b>${val.question}</b><b>${val.answer}</b></li>
                <hr>
            </ul>
            <!-- <ul id="sug-dict" style="display: none;" class="sug-list">
            </ul>
            <ul id="sug-other" style="display: none;" class="sug-list">
            </ul> -->
        </div>

    </div>
    <div class="add-footer">
        <button onclick="onAdd();" type="button" style="grid-area: plus;">+</button>
        <button onclick="onSave();" type="button" style="grid-area: save;">Save</button>
        <button onclick="onCancel();" class="secondary" type="button" style="grid-area: cancel;">Cancel</button>
    </div>

</main>
{% endblock %}

{% block script %}
    <script src="/static/js/explore.js"></script>
    <script src="/static/js/nav.js"></script>
{% endblock %}
