{% extends 'base.html' %}

{% block cssimp %}
    {{ super() }}
    <link rel="stylesheet" href="/static/css/login.css">
{% endblock %}

{% block title %}
    Login
{% endblock %}

{% block content %}
<header>
    <h1>Banana Choco</h1>
    <div class="group">
        <hr>
        <h4>flash card</h4>
        <hr>
    </div>
    <div class="bg"></div>
</header>
<form>
    <h1>Login</h1>
    <label for="email">Email</label>
    <input type="text" name="email" placeholder="Email...">
    <label for="password">Password</label>
    <input type="password" name="password" placeholder="Password...">
    <button type="submit">Login</button>
    <div class="or">
        <hr style="border-top-right-radius: 1rem;border-bottom-right-radius: 1rem;">
        <h3>or</h3>
        <hr style="border-top-left-radius: 1rem;border-bottom-left-radius: 1rem;">
    </div>
    <div class="sso-group">
        <button type="button" class="icon-btn" style="background-image: url(/static/image/google-icon.png);"></button>
        <button type="button" class="icon-btn" style="background-image: url(/static/image/ms-icon.png);"></button>
    </div>
</form>
<footer>Don't have an account? <a href="/register"><b><u>Sign Up</u></b></a></footer>
{% endblock %}
